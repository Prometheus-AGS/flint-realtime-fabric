version: v2
plugins:
  - local: protoc-gen-go
    out: ../sdks/go/gen
    opt:
      - paths=source_relative
  - local: protoc-gen-connect-go
    out: ../sdks/go/gen
    opt:
      - paths=source_relative
  - remote: buf.build/bufbuild/es:v2.12.0
    out: ../sdks/ts/src/gen
    opt:
      - target=ts
  - remote: buf.build/connectrpc/es:v1.6.1
    out: ../sdks/ts/src/gen
    opt:
      - target=ts
