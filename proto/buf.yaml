version: v2
modules:
  - path: .
    name: buf.build/prometheusags/frf
lint:
  use:
    - STANDARD
  # RPC naming violations are pre-existing in the frozen proto-v1 contract.
  # These cannot be fixed without a breaking wire change. Suppress only these
  # specific rules; all other STANDARD rules remain enforced.
  ignore_only:
    RPC_REQUEST_RESPONSE_UNIQUE:
      - flint/v1/signal.proto
      - flint/v1/sync.proto
    RPC_REQUEST_STANDARD_NAME:
      - flint/v1/agent.proto
      - flint/v1/signal.proto
      - flint/v1/sync.proto
    RPC_RESPONSE_STANDARD_NAME:
      - flint/v1/agent.proto
      - flint/v1/entity.proto
      - flint/v1/envelope.proto
      - flint/v1/signal.proto
      - flint/v1/sync.proto
breaking:
  use:
    - FILE
  # csharp_namespace and go_package are codegen-only metadata options; they do
  # not affect protobuf wire encoding. Changing them post-freeze is safe.
  # go_package was updated to use the SDK-local module path so generated code
  # compiles in a single Go module without an invalid /v1 module path suffix.
  ignore_only:
    FILE_SAME_CSHARP_NAMESPACE:
      - flint/v1/agent.proto
      - flint/v1/authz.proto
      - flint/v1/entity.proto
      - flint/v1/envelope.proto
      - flint/v1/signal.proto
      - flint/v1/sync.proto
    FILE_SAME_GO_PACKAGE:
      - flint/v1/agent.proto
      - flint/v1/authz.proto
      - flint/v1/entity.proto
      - flint/v1/envelope.proto
      - flint/v1/signal.proto
      - flint/v1/sync.proto
