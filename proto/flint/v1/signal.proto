syntax = "proto3";

package flint.v1;

option go_package = "github.com/prometheusags/frf/proto/flint/v1;flintv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

enum SignalKind {
  SIGNAL_KIND_UNSPECIFIED = 0;
  SIGNAL_KIND_OFFER = 1;
  SIGNAL_KIND_ANSWER = 2;
  SIGNAL_KIND_ICE_CANDIDATE = 3;
  SIGNAL_KIND_ICE_RESTART = 4;
  SIGNAL_KIND_HANGUP = 5;
  SIGNAL_KIND_ROOM_JOIN = 6;
  SIGNAL_KIND_ROOM_LEAVE = 7;
}

enum SfuMode {
  SFU_MODE_UNSPECIFIED = 0;
  // str0m sans-I/O sovereign SFU.
  SFU_MODE_SOVEREIGN = 1;
  // LiveKit hosted SFU.
  SFU_MODE_HOSTED = 2;
}

// WebRTC signaling envelope — routed through the spine, never stored.
message SignalEnvelope {
  string from_session = 1;
  string to_session = 2;
  string tenant_id = 3;
  string room_id = 4;
  SignalKind kind = 5;
  SfuMode sfu_mode = 6;
  // SDP or ICE candidate JSON payload.
  google.protobuf.Struct payload = 7;
  google.protobuf.Timestamp timestamp = 8;
}

// --- Signal service (bidi for signaling) ---

service SignalService {
  rpc Signal(stream SignalEnvelope) returns (stream SignalEnvelope);
}
